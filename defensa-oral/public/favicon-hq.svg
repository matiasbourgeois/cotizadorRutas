    - Refinamiento de la punta inferior imitando la caída real del logo de RouteIQ.
  -->
  <path fill="url(#pinGrad)" fill-rule="evenodd" clip-rule="evenodd" d="
    M 60 20 
    L 140 20 
    A 40 40 0 0 1 180 60 
    L 180 125 
    Q 180 148 163 163 
    L 112 222 
    Q 100 236 88 222 
    L 37 163 
    Q 20 148 20 125 
    L 20 60 
    A 40 40 0 0 1 60 20 
    Z 
    M 75 45 
    A 15 15 0 0 0 60 60 
    L 60 115 
    A 15 15 0 0 0 75 130 
    L 125 130 
    A 15 15 0 0 0 140 115 
    L 140 60 
