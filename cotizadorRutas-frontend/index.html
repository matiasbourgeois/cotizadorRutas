    <!-- ═══ JSON-LD Structured Data — FAQPage (AI visibility) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es Quotargo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Quotargo es una plataforma argentina de cotización logística inteligente. Permite calcular el costo real de operaciones de transporte FTL (Full Truck Load) incluyendo combustible, depreciación, peajes, recursos humanos, cargas sociales y generar presupuestos profesionales automáticamente."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es FTL (Full Truck Load)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FTL (Full Truck Load) es una modalidad de transporte donde el camión viaja exclusivamente con tu carga. A diferencia del LTL (carga compartida), en FTL tu mercadería ocupa el vehículo completo, ofreciendo mayor seguridad, rapidez y trazabilidad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo se calculan los costos logísticos en Quotargo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Quotargo calcula costos reales considerando: combustible (con soporte GNC), desgaste de cubiertas, cambio de aceite, depreciación del vehículo, costos fijos (seguro, patente, mantenimiento), recursos humanos (sueldo, cargas sociales CCT 40/89, viáticos, adicionales por km), feriados nacionales, tipo de carga (general, refrigerada, peligrosa) y frecuencia del servicio."
          }
        },
        {
          "@type": "Question",
          "name": "¿Quotargo es gratuito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, Quotargo es de uso gratuito. Podés crear tu cuenta, gestionar tu flota, cargar recursos humanos y generar cotizaciones sin costo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué documentos genera Quotargo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Quotargo genera dos documentos profesionales: una Propuesta Comercial de 3 páginas lista para el cliente (con portada, resumen ejecutivo, mapa y QR), y un Desglose Interno de 7 capítulos con el análisis completo de costos para uso de la empresa."
          }
        }
      ]
    }
